<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnackClub - Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; width: 100%; max-width: 460px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 22px; }
        .view-btn { background: #334155; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .view-btn.active { background: var(--accent); color: #0f172a; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: var(--accent); outline: none; }

        /* FIX: All three plan badge styles defined so Premium and Platinum render correctly */
        .plan-badge { display: inline-block; padding: 6px 18px; border-radius: 30px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .badge-basic    { background: #334155; color: #94a3b8; }
        .badge-premium  { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid #fbbf24; }
        .badge-platinum { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid #a78bfa; }

        button.action-btn { width: 100%; padding: 12px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 4px; }
        button.action-btn:disabled { background: #334155; color: var(--text-muted); cursor: not-allowed; }
        .status-msg { text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: 500; }
        .success { color: #4ade80; } .error { color: #f87171; } .info { color: var(--accent); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
<div class="container">

    <!-- Main dashboard workspace -->
    <div id="main-workspace">
        <div class="header">
            <h2 id="welcome-title">Dashboard</h2>
            <div style="display:flex; gap:5px;">
                <button id="v-prof" class="view-btn active" onclick="setView('prof')">Profile</button>
                <button id="v-set" class="view-btn" onclick="setView('set')">Settings</button>
            </div>
        </div>

        <!-- Profile view -->
        <div id="p-prof" class="panel active">
            <div style="background:#0f172a; border:1px solid #334155; border-radius:12px; padding:20px; margin-bottom:20px;">
                <div class="form-group">
                    <label>Full Name</label>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="text" id="dash-name" disabled style="flex:1; color:#94a3b8;">
                        <button class="action-btn" id="edit-name-btn" onclick="toggleNameEdit()" style="width:auto; padding:12px 20px; margin:0;">Edit</button>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Email <span style="font-size:11px; color:#f87171;">(Locked)</span></label>
                    <input type="email" id="dash-email" disabled style="color:#475569; border-color:#1e293b; cursor:not-allowed;">
                </div>
            </div>

            <div style="background:#0f172a; border:1px solid #334155; border-radius:12px; padding:20px; text-align:center; margin-bottom:25px;">
                <p id="dash-days-label" style="font-size:12px; color:#4ade80; margin-bottom:8px; font-weight:bold; letter-spacing:0.5px;"></p>
                <div id="dash-plan-badge" class="plan-badge"></div>
                <p id="dash-plan-desc" style="font-size:13px; color:var(--text-muted); margin:8px 0 0 0; line-height:1.4;"></p>
            </div>
        </div>

        <!-- Settings view -->
        <div id="p-set" class="panel">
            <div style="background:#0f172a; border:1px solid #334155; border-radius:12px; padding:20px; margin-bottom:25px;">
                <h3 style="font-size:15px; color:var(--text); margin:0 0 10px 0;">Agreement Settings</h3>
                <p style="font-size:13px; color:var(--text-muted); margin-bottom:15px; line-height:1.4;">
                    Unchecking the box below will freeze your account and pause your billing cycle.
                </p>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="terms-toggle" onchange="handleFreezeToggle()" style="width:auto; cursor:pointer;" checked>
                    <label for="terms-toggle" style="margin:0; color:#f87171; font-weight:bold; cursor:pointer;">I agree to the SnackClub Terms</label>
                </div>
            </div>
        </div>

        <button class="action-btn" onclick="logout()" style="background:#334155; color:#f87171;">Log Out</button>
        <div id="dash-status" class="status-msg"></div>
    </div>

    <!-- Frozen account panel -->
    <div id="freeze-panel" style="display:none; text-align:center; padding:20px 0;">
        <span style="font-size:40px;">❄️</span>
        <h2 style="color:#fbbf24; margin:10px 0;">Account Frozen</h2>
        <p style="font-size:14px; color:var(--text-muted); line-height:1.5; margin-bottom:20px;">
            Your account is paused. Re-accept the Terms of Use below to unfreeze and regain access.
        </p>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px; background:#0f172a; padding:15px; border-radius:8px; border:1px solid #334155;">
            <input type="checkbox" id="force-agree-checkbox" onchange="toggleUnfreezeBtn()" style="width:auto; cursor:pointer; margin:0;">
            <label for="force-agree-checkbox" style="display:inline; font-size:13px; color:var(--text); cursor:pointer; margin:0;">
                I re-accept the <a href="terms.html" target="_blank" style="color:var(--accent);">Terms of Use</a> and want to unfreeze my account.
            </label>
        </div>
        <button class="action-btn" id="unfreeze-btn" onclick="unfreezeAccount()" disabled>Unfreeze My Account</button>
        <div id="freeze-status" class="status-msg"></div>
    </div>

</div>

<script>
    // -------------------------------------------------------
    // FIREBASE CONFIGURATION — replace with your real config
    // -------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyAGL9MH0O1wHKGbOwj26Ha0HPiBDuP0sf0",
        authDomain: "snackclub-69180.firebaseapp.com",
        projectId: "snackclub-69180",
        storageBucket: "snackclub-69180.firebasestorage.app",
        messagingSenderId: "756043384282",
        appId: "1:756043384282:web:a052e61fde3490a5a0ace3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let userUID = null;
    let isEditingName = false;

    // Redirect to login if not signed in
    auth.onAuthStateChanged(function(user) {
        if (user) {
            userUID = user.uid;
            loadDashboard();
        } else {
            window.location.href = "login.html";
        }
    });

    function loadDashboard() {
        db.collection("members").doc(userUID).get()
            .then(function(doc) {
                if (!doc.exists) {
                    window.location.href = "login.html";
                    return;
                }
                const data = doc.data();

                if (data.status === 'Frozen') {
                    document.getElementById('main-workspace').style.display = 'none';
                    document.getElementById('freeze-panel').style.display = 'block';
                    document.getElementById('force-agree-checkbox').checked = false;
                    document.getElementById('unfreeze-btn').disabled = true;
                    return;
                }

                // Pending cash — show message, don't load dashboard
                if (data.status === 'Pending Cash Validation') {
                    document.getElementById('main-workspace').innerHTML =
                        '<div style="text-align:center; padding:20px;">' +
                        '<span style="font-size:40px;">🕒</span>' +
                        '<h2 style="color:#fbbf24; margin:10px 0;">Pending Activation</h2>' +
                        '<p style="color:var(--text-muted); font-size:14px; line-height:1.5;">Your cash registration (<strong style="color:var(--accent);">' + data.paymentId + '</strong>) is waiting for admin confirmation.</p>' +
                        '<button class="action-btn" onclick="logout()" style="background:#334155; color:#f87171; margin-top:20px;">Log Out</button>' +
                        '</div>';
                    return;
                }

                // Active account — populate dashboard
                document.getElementById('welcome-title').innerText = "Hi, " + data.name.split(' ')[0] + "! 👋";
                document.getElementById('dash-name').value = data.name;
                document.getElementById('dash-email').value = data.email || data.phone || '';
                document.getElementById('dash-days-label').innerText = "⏱️ " + data.daysRemaining + " DAYS REMAINING IN CYCLE";

                const badge = document.getElementById('dash-plan-badge');
                badge.innerText = data.planLabel + " Member";
                badge.className = "plan-badge badge-" + data.plan;

                const desc = document.getElementById('dash-plan-desc');
                if (data.plan === 'basic')    desc.innerText = "First come, first served on whatever's remaining.";
                if (data.plan === 'premium')  desc.innerText = "You're in the randomized snack queue each cycle!";
                if (data.plan === 'platinum') desc.innerText = "Pick your snacks from our current inventory. Your order, your way.";
            })
            .catch(function(err) {
                console.error("Dashboard load error:", err);
            });
    }

    function setView(v) {
        document.getElementById('p-prof').classList.toggle('active', v === 'prof');
        document.getElementById('p-set').classList.toggle('active', v === 'set');
        document.getElementById('v-prof').classList.toggle('active', v === 'prof');
        document.getElementById('v-set').classList.toggle('active', v === 'set');
    }

    // -------------------------------------------------------
    // EDIT NAME
    // -------------------------------------------------------
    function toggleNameEdit() {
        const nameInput = document.getElementById('dash-name');
        const editBtn = document.getElementById('edit-name-btn');
        const statusDiv = document.getElementById('dash-status');

        if (!isEditingName) {
            isEditingName = true;
            nameInput.disabled = false;
            nameInput.style.color = "white";
            nameInput.focus();
            editBtn.innerText = "Save";
            editBtn.style.background = "#4ade80";
            editBtn.style.color = "#0f172a";
        } else {
            const newName = nameInput.value.trim();
            if (!newName) return;
            editBtn.disabled = true;
            db.collection("members").doc(userUID).update({ name: newName })
                .then(function() {
                    isEditingName = false;
                    nameInput.disabled = true;
                    nameInput.style.color = "#94a3b8";
                    editBtn.disabled = false;
                    editBtn.innerText = "Edit";
                    editBtn.style.background = "var(--accent)";
                    editBtn.style.color = "#0f172a";
                    statusDiv.className = "status-msg success";
                    statusDiv.innerText = "✅ Name updated!";
                })
                .catch(function(err) {
                    editBtn.disabled = false;
                    statusDiv.className = "status-msg error";
                    statusDiv.innerText = "Failed to update name. Please try again.";
                });
        }
    }

    // -------------------------------------------------------
    // FREEZE / UNFREEZE
    // -------------------------------------------------------
    function handleFreezeToggle() {
        const isChecked = document.getElementById('terms-toggle').checked;
        const statusDiv = document.getElementById('dash-status');
        if (!isChecked) {
            statusDiv.className = "status-msg info"; statusDiv.innerText = "Freezing your account...";
            db.collection("members").doc(userUID).update({ status: 'Frozen' })
                .then(function() {
                    statusDiv.className = "status-msg error"; statusDiv.innerText = "❄️ Account frozen. Billing paused.";
                    setTimeout(function() { loadDashboard(); }, 1500);
                })
                .catch(function(err) {
                    statusDiv.className = "status-msg error"; statusDiv.innerText = "Failed to freeze account. Please try again.";
                    document.getElementById('terms-toggle').checked = true;
                });
        }
    }

    function toggleUnfreezeBtn() {
        document.getElementById('unfreeze-btn').disabled = !document.getElementById('force-agree-checkbox').checked;
    }

    function unfreezeAccount() {
        const statusDiv = document.getElementById('freeze-status');
        statusDiv.className = "status-msg info"; statusDiv.innerText = "Reactivating your account...";
        db.collection("members").doc(userUID).update({ status: 'Active' })
            .then(function() {
                statusDiv.className = "status-msg success"; statusDiv.innerText = "⚡ Account unfrozen!";
                setTimeout(function() {
                    document.getElementById('freeze-panel').style.display = 'none';
                    document.getElementById('main-workspace').style.display = 'block';
                    loadDashboard();
                }, 1000);
            })
            .catch(function(err) {
                statusDiv.className = "status-msg error"; statusDiv.innerText = "Failed to unfreeze. Please try again.";
            });
    }

    // -------------------------------------------------------
    // LOGOUT
    // -------------------------------------------------------
    function logout() {
        auth.signOut().then(function() { window.location.href = "login.html"; });
    }
</script>
</body>
</html>
