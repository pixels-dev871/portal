<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnackClub - Sign Up</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; --text: #f8fafc; --text-muted: #94a3b8; --tab-inactive: #334155; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 450px; }
        h2 { margin-top: 0; font-size: 24px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--text-muted); }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 15px; }
        input:focus, select:focus { border-color: var(--accent); outline: none; }
        .method-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 11px; background: var(--tab-inactive); border: none; color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .tab.active { background: var(--accent); color: #0f172a; }
        .panel { display: none; }
        .panel.active { display: block; }
        .plan-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .plan-card { border: 2px solid #334155; border-radius: 12px; padding: 14px; cursor: pointer; transition: 0.2s; display: block; }
        .plan-card:hover { border-color: #64748b; }
        .plan-card.selected { border-color: var(--accent); background: rgba(56,189,248,0.07); }
        .plan-card input[type="radio"] { display: none; }
        .plan-card-header { display: flex; justify-content: space-between; align-items: center; }
        .plan-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 6px; }
        .plan-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; }
        .badge-basic { background: #334155; color: #94a3b8; }
        .badge-premium { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid #fbbf24; }
        .badge-platinum { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid #a78bfa; }
        .plan-price { font-size: 15px; font-weight: 700; color: var(--accent); }
        .plan-price.free { color: #4ade80; }
        .plan-desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
        .plan-card.selected .plan-desc { color: #cbd5e1; }
        .pricing-note { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: -10px; margin-bottom: 15px; }
        button.action-btn { width: 100%; padding: 12px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button.action-btn:disabled { background: #334155; color: var(--text-muted); cursor: not-allowed; }
        .divider { text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 14px; }
        .google-btn { width: 100%; padding: 12px; background: white; color: #1e293b; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #paypal-button-container, #cash-instructions-container { margin-top: 20px; display: none; }
        .status-msg { text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: 500; }
        .success { color: #4ade80; } .error { color: #f87171; } .info { color: var(--accent); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- PayPal SDK: Replace "test" with your live client-id from developer.paypal.com when going live -->
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=CAD"></script>
</head>
<body>
<div class="container">
    <h2>🍿 Join SnackClub</h2>

    <div id="registration-core-form">
        <div class="method-tabs">
            <button class="tab active" id="tab-email" onclick="switchMethod('email')">Email Sign Up</button>
            <button class="tab" id="tab-phone" onclick="switchMethod('phone')">Phone Sign Up</button>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="Angus Lin">
        </div>

        <div id="panel-email" class="panel active">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-pass" placeholder="••••••••">
            </div>
        </div>

        <div id="panel-phone" class="panel">
            <div class="form-group">
                <label>Phone Number (with country code)</label>
                <input type="text" id="reg-phone" placeholder="+14165550199">
            </div>
            <div class="form-group">
                <label>Account Password</label>
                <input type="password" id="reg-phone-pass" placeholder="••••••••">
            </div>
            <div id="recaptcha-container"></div>
        </div>

        <label style="margin-bottom:10px; display:block; font-size:14px; color:var(--text-muted);">Choose Your Membership Plan</label>
        <div class="plan-cards">
            <label class="plan-card" id="card-basic" onclick="selectPlan('basic')">
                <input type="radio" name="plan" value="basic">
                <div class="plan-card-header">
                    <div class="plan-name">🥨 Basic <span class="plan-badge badge-basic">Free</span></div>
                    <div class="plan-price free">FREE</div>
                </div>
                <div class="plan-desc">You might get leftovers — sometimes there's nothing left. First come, first served on whatever's remaining.</div>
            </label>

            <label class="plan-card" id="card-premium" onclick="selectPlan('premium')">
                <input type="radio" name="plan" value="premium">
                <div class="plan-card-header">
                    <div class="plan-name">🍫 Premium <span class="plan-badge badge-premium">Popular</span></div>
                    <div class="plan-price">$16.95/mo</div>
                </div>
                <div class="plan-desc">You'll get snacks — but availability is randomized. First come, first served each cycle. No guarantees, but you're in the queue!</div>
            </label>

            <label class="plan-card" id="card-platinum" onclick="selectPlan('platinum')">
                <input type="radio" name="plan" value="platinum">
                <div class="plan-card-header">
                    <div class="plan-name">👑 Platinum <span class="plan-badge badge-platinum">Best</span></div>
                    <div class="plan-price">$33.90/mo</div>
                </div>
                <div class="plan-desc">You always get snacks — and you get to choose! Pick from whatever's in our current inventory. Your order, your way.</div>
            </label>
        </div>
        <p class="pricing-note">Paid plans include 13% Ontario HST ($15 → $16.95 | $30 → $33.90)</p>

        <div class="form-group" style="margin-bottom: 20px;">
            <label>Payment Method</label>
            <select id="reg-payment-method">
                <option value="paypal">PayPal / Credit Card</option>
                <option value="cash">Pay with Cash (Direct Hand-in)</option>
            </select>
        </div>

        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
            <input type="checkbox" id="agree-check" onchange="toggleSubmit()" style="width: auto; margin: 0;">
            <label for="agree-check" style="display: inline; font-size: 13px; color: var(--text); margin: 0;">
                I agree to the <a href="terms.html" target="_blank" style="color: var(--accent);">Terms of Use</a>.
            </label>
        </div>

        <button class="action-btn" id="submit-btn" onclick="processRegistrationFlow()" disabled>Next to Payment</button>

        <div class="divider">OR</div>
        <button class="google-btn" onclick="registerWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/provider/google.svg" width="18" alt="Google"> Continue with Google
        </button>
    </div>

    <!-- PayPal checkout renders here -->
    <div id="paypal-button-container"></div>

    <!-- Cash payment confirmation -->
    <div id="cash-instructions-container" style="background: #0f172a; border: 1px solid #fbbf24; border-radius: 12px; padding: 20px; text-align: center;">
        <span style="font-size: 32px;">💵</span>
        <h3 style="color: #fbbf24; margin: 10px 0 5px 0;">Cash Registration Initiated</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px;">Show this code to the admin alongside your exact cash payment to activate your membership.</p>
        <div id="cash-generated-code" style="background: #1e293b; border: 1px solid #334155; font-family: monospace; font-size: 24px; font-weight: bold; color: var(--accent); padding: 12px; border-radius: 8px; letter-spacing: 2px;">------</div>
        <p id="cash-amount-due" style="font-size: 14px; font-weight: bold; color: white; margin-top: 10px;"></p>
    </div>

    <div id="signup-status" class="status-msg"></div>
    <p style="text-align:center; font-size:13px; margin-top:20px; margin-bottom:0; color:var(--text-muted);">Already a member? <a href="login.html" style="color:var(--accent);">Log In</a></p>
</div>

<script>
    // -------------------------------------------------------
    // FIREBASE CONFIGURATION — replace with your real config
    // -------------------------------------------------------
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentMethod = 'email';
    let selectedPlan = null;
    let paypalRendered = false;
    let cachedRegistrationPayload = null;

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });

    const PLANS = {
        basic:    { label: 'Basic',    total: '0.00',  base: 0,     hst: 0    },
        premium:  { label: 'Premium',  total: '16.95', base: 15.00, hst: 1.95 },
        platinum: { label: 'Platinum', total: '33.90', base: 30.00, hst: 3.90 }
    };

    // -------------------------------------------------------
    // UI HELPERS
    // -------------------------------------------------------
    function switchMethod(m) {
        currentMethod = m;
        document.getElementById('tab-email').classList.toggle('active', m === 'email');
        document.getElementById('tab-phone').classList.toggle('active', m === 'phone');
        document.getElementById('panel-email').classList.toggle('active', m === 'email');
        document.getElementById('panel-phone').classList.toggle('active', m === 'phone');
    }

    function selectPlan(plan) {
        selectedPlan = plan;
        ['basic', 'premium', 'platinum'].forEach(p => {
            document.getElementById('card-' + p).classList.toggle('selected', p === plan);
        });
    }

    function toggleSubmit() {
        document.getElementById('submit-btn').disabled = !document.getElementById('agree-check').checked;
    }

    function generateCashCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = 'SC-';
        for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
        return code;
    }

    // -------------------------------------------------------
    // BOT MITIGATION — exact device IP, not subnet block
    // -------------------------------------------------------
    async function verifyDeviceTrafficSafety() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const deviceIP = (await res.json()).ip;
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000);
            const attempts = await db.collection("registration_attempts")
                .where("deviceIP", "==", deviceIP)
                .where("timestamp", ">", oneHourAgo)
                .get();

            if (attempts.size >= 5) {
                const answer = window.prompt("Too many attempts from this device. Type 'HUMAN' to continue:");
                if (!answer || answer.trim().toUpperCase() !== 'HUMAN') return false;
            }
            await db.collection("registration_attempts").add({ deviceIP, timestamp: new Date() });
            return true;
        } catch(e) {
            return true; // Allow through if IP check fails
        }
    }

    // -------------------------------------------------------
    // MAIN REGISTRATION FLOW
    // -------------------------------------------------------
    async function processRegistrationFlow() {
        const name = document.getElementById('reg-name').value.trim();
        const status = document.getElementById('signup-status');
        const paymentMethod = document.getElementById('reg-payment-method').value;

        if (!name) {
            status.className = "status-msg error"; status.innerText = "Please enter your full name."; return;
        }
        if (!selectedPlan) {
            status.className = "status-msg error"; status.innerText = "Please select a membership plan."; return;
        }

        // Validate email/phone fields
        if (currentMethod === 'email') {
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            if (!email || !pass) {
                status.className = "status-msg error"; status.innerText = "Please enter your email and password."; return;
            }
        } else {
            const phone = document.getElementById('reg-phone').value.trim();
            if (!phone) {
                status.className = "status-msg error"; status.innerText = "Please enter your phone number."; return;
            }
        }

        status.className = "status-msg info"; status.innerText = "Checking your info...";
        const isSafe = await verifyDeviceTrafficSafety();
        if (!isSafe) {
            status.className = "status-msg error";
            status.innerText = "Too many attempts from this device. Please try again later.";
            return;
        }

        const plan = PLANS[selectedPlan];
        cachedRegistrationPayload = { name, plan: selectedPlan, planLabel: plan.label, total: plan.total };

        // Basic — free, no payment needed
        if (selectedPlan === 'basic') {
            executeAuthAndSave('FREE', 'Active');
            return;
        }

        // Cash payment
        if (paymentMethod === 'cash') {
            const cashCode = generateCashCode();
            executeAuthAndSave(cashCode, 'Pending Cash Validation', true);
            return;
        }

        // PayPal — show checkout
        document.getElementById('registration-core-form').style.display = 'none';
        document.getElementById('paypal-button-container').style.display = 'block';
        status.className = "status-msg info";
        status.innerText = "Complete your payment below.";

        if (!paypalRendered) {
            paypal.Buttons({
                createOrder: function(data, actions) {
                    // FIX: Read from cachedRegistrationPayload at click time — never stale
                    const activePlan = PLANS[cachedRegistrationPayload.plan];
                    return actions.order.create({
                        purchase_units: [{
                            amount: {
                                value: activePlan.total,
                                breakdown: {
                                    item_total: { currency_code: 'CAD', value: activePlan.base.toFixed(2) },
                                    tax_total:  { currency_code: 'CAD', value: activePlan.hst.toFixed(2) }
                                }
                            },
                            description: "SnackClub " + activePlan.label + " Membership"
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        executeAuthAndSave(details.id, 'Active');
                    });
                },
                onError: function(err) {
                    console.error("PayPal error:", err);
                    document.getElementById('signup-status').className = "status-msg error";
                    document.getElementById('signup-status').innerText = "Payment failed or was cancelled. Please try again.";
                    document.getElementById('registration-core-form').style.display = 'block';
                    document.getElementById('paypal-button-container').style.display = 'none';
                }
            }).render('#paypal-button-container');
            paypalRendered = true;
        }
    }

    // -------------------------------------------------------
    // AUTH — creates Firebase account, then saves to Firestore
    // FIX: Account is always created BEFORE payment is recorded
    // -------------------------------------------------------
    function executeAuthAndSave(paymentId, accountStatus, isCash = false) {
        const status = document.getElementById('signup-status');

        if (currentMethod === 'email') {
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            status.className = "status-msg info"; status.innerText = "Creating your account...";
            auth.createUserWithEmailAndPassword(email, pass)
                .then(function(res) {
                    res.user.sendEmailVerification();
                    saveToFirestore(res.user.uid, email, null, paymentId, accountStatus, isCash);
                })
                .catch(function(e) {
                    status.className = "status-msg error"; status.innerText = e.message;
                });
        } else {
            const phone = document.getElementById('reg-phone').value.trim();
            status.className = "status-msg info"; status.innerText = "Sending verification SMS...";
            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
                .then(function(confirmation) {
                    const code = window.prompt("Enter the 6-digit SMS code sent to your phone:");
                    confirmation.confirm(code)
                        .then(function(res) {
                            saveToFirestore(res.user.uid, null, phone, paymentId, accountStatus, isCash);
                        })
                        .catch(function() {
                            status.className = "status-msg error"; status.innerText = "Incorrect SMS code. Please try again.";
                        });
                })
                .catch(function(e) {
                    status.className = "status-msg error"; status.innerText = e.message;
                });
        }
    }

    // -------------------------------------------------------
    // SAVE TO FIRESTORE
    // -------------------------------------------------------
    function saveToFirestore(uid, emailVal, phoneVal, paymentId, accountStatus, isCash) {
        const status = document.getElementById('signup-status');
        db.collection("members").doc(uid).set({
            name:          cachedRegistrationPayload.name,
            email:         emailVal,
            phone:         phoneVal,
            plan:          cachedRegistrationPayload.plan,
            planLabel:     cachedRegistrationPayload.planLabel,
            paymentId:     paymentId,
            status:        accountStatus,
            daysRemaining: 30,
            dateJoined:    new Date()
        }).then(function() {
            if (isCash) {
                document.getElementById('registration-core-form').style.display = 'none';
                document.getElementById('cash-generated-code').innerText = paymentId;
                document.getElementById('cash-amount-due').innerText = "Amount Due: $" + cachedRegistrationPayload.total + " CAD";
                document.getElementById('cash-instructions-container').style.display = 'block';
                status.className = "status-msg info";
                status.innerText = "Registration saved! Show this code to the admin with your cash.";
            } else {
                status.className = "status-msg success";
                status.innerText = "🎉 Account created! Check your email to verify, then go to Login.";
            }
            auth.signOut();
        }).catch(function(err) {
            console.error("Firestore save error:", err);
            status.className = "status-msg error";
            status.innerText = "Account created but save failed. Contact admin.";
        });
    }

    // -------------------------------------------------------
    // GOOGLE SIGN UP
    // FIX: Checks plan is selected first, runs payment BEFORE
    // Google popup so no money is taken without an account.
    // Google basic/cash routes sign in first, then save.
    // -------------------------------------------------------
    async function registerWithGoogle() {
        const status = document.getElementById('signup-status');

        if (!selectedPlan) {
            status.className = "status-msg error";
            status.innerText = "Please select a membership plan before using Google Sign-In.";
            return;
        }

        status.className = "status-msg info"; status.innerText = "Checking your info...";
        const isSafe = await verifyDeviceTrafficSafety();
        if (!isSafe) {
            status.className = "status-msg error";
            status.innerText = "Too many attempts from this device. Please try again later.";
            return;
        }

        const plan = PLANS[selectedPlan];
        const name = document.getElementById('reg-name').value.trim();
        const paymentMethod = document.getElementById('reg-payment-method').value;
        cachedRegistrationPayload = { name, plan: selectedPlan, planLabel: plan.label, total: plan.total };

        // Paid + PayPal: show PayPal first, Google popup after payment confirmed
        if (selectedPlan !== 'basic' && paymentMethod === 'paypal') {
            document.getElementById('registration-core-form').style.display = 'none';
            document.getElementById('paypal-button-container').style.display = 'block';
            status.className = "status-msg info"; status.innerText = "Complete payment, then your Google account will be linked.";

            if (!paypalRendered) {
                paypal.Buttons({
                    createOrder: function(data, actions) {
                        const activePlan = PLANS[cachedRegistrationPayload.plan];
                        return actions.order.create({
                            purchase_units: [{
                                amount: {
                                    value: activePlan.total,
                                    breakdown: {
                                        item_total: { currency_code: 'CAD', value: activePlan.base.toFixed(2) },
                                        tax_total:  { currency_code: 'CAD', value: activePlan.hst.toFixed(2) }
                                    }
                                },
                                description: "SnackClub " + activePlan.label + " Membership"
                            }]
                        });
                    },
                    onApprove: function(data, actions) {
                        return actions.order.capture().then(function(details) {
                            // Payment confirmed — now open Google sign-in
                            status.className = "status-msg info"; status.innerText = "Payment confirmed! Opening Google sign-in...";
                            const provider = new firebase.auth.GoogleAuthProvider();
                            auth.signInWithPopup(provider).then(function(res) {
                                if (!cachedRegistrationPayload.name) cachedRegistrationPayload.name = res.user.displayName || "Google Member";
                                saveToFirestore(res.user.uid, res.user.email, null, details.id, 'Active', false);
                            }).catch(function(e) {
                                status.className = "status-msg error";
                                status.innerText = "Payment went through but Google sign-in failed. Contact admin with your PayPal receipt.";
                            });
                        });
                    },
                    onError: function(err) {
                        console.error("PayPal error:", err);
                        status.className = "status-msg error"; status.innerText = "Payment failed. Please try again.";
                        document.getElementById('registration-core-form').style.display = 'block';
                        document.getElementById('paypal-button-container').style.display = 'none';
                    }
                }).render('#paypal-button-container');
                paypalRendered = true;
            }
            return;
        }

        // Basic or Cash: Google sign-in first, then save
        const cashCode = selectedPlan === 'basic' ? 'GOOGLE-FREE' : generateCashCode();
        const initialStatus = selectedPlan === 'basic' ? 'Active' : 'Pending Cash Validation';
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.signInWithPopup(provider).then(function(res) {
            if (!cachedRegistrationPayload.name) cachedRegistrationPayload.name = res.user.displayName || "Google Member";
            saveToFirestore(res.user.uid, res.user.email, null, cashCode, initialStatus, selectedPlan !== 'basic');
        }).catch(function(e) {
            status.className = "status-msg error"; status.innerText = e.message;
        });
    }
</script>
</body>
</html>
