<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnackClub</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --text-muted: #94a3b8; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 6px; }
        p { color: var(--text-muted); margin-bottom: 30px; font-size: 15px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; text-decoration: none; display: block; }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-secondary { background: #334155; color: var(--text); }
        .btn-secondary:hover { background: #475569; }
        .status-msg { margin-top: 15px; font-size: 14px; color: #f87171; font-weight: 500; min-height: 20px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="container">
    <h1>🍿 SnackClub</h1>
    <p>Members-only snack access</p>
    <div class="btn-group">
        <a href="signup.html" class="btn btn-primary" id="signup-link">Create an Account</a>
        <a href="login.html" class="btn btn-secondary">Sign In</a>
    </div>
    <div id="index-status" class="status-msg"></div>
</div>

<script>
    // -------------------------------------------------------
    // FIREBASE CONFIGURATION
    // Replace all values with your real Firebase config.
    // Get it from: Firebase Console → Project Settings → Your apps → SDK setup
    // -------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyAGL9MH0O1wHKGbOwj26Ha0HPiBDuP0sf0",
        authDomain: "snackclub-69180.firebaseapp.com",
        projectId: "snackclub-69180",
        storageBucket: "snackclub-69180.firebasestorage.app",
        messagingSenderId: "756043384282",
        appId: "1:756043384282:web:a052e61fde3490a5a0ace3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Bot defense: checks exact device IP (not subnet) so only
    // the offending device is blocked, not an entire building.
    async function scanTraffic() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const ipData = await res.json();
            const deviceIP = ipData.ip;

            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000);
            const attempts = await db.collection("registration_attempts")
                .where("deviceIP", "==", deviceIP)
                .where("timestamp", ">", oneHourAgo)
                .get();

            if (attempts.size >= 5) {
                const check = window.prompt("Too many attempts from this device. Type 'HUMAN' to continue:");
                if (!check || check.trim().toUpperCase() !== 'HUMAN') {
                    document.getElementById('signup-link').removeAttribute('href');
                    document.getElementById('index-status').innerText = "🛑 Access denied. Please try again later.";
                }
            }
        } catch(e) { /* Allow through if IP check fails */ }
    }
    scanTraffic();
</script>
</body>
</html>
